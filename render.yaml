services:
  - type: web
    name: securpdfbf-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: 20
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 20
      - key: GMAIL_USER
        sync: false 
      - key: GMAIL_APP_PASSWORD
        sync: false
